<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-left: 4px solid #a78bfa; /* 薄い紫ライン */
            transition: transform .15s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .dashboard-title {
            color: #6d28d9;
            font-weight: 600;
        }
    </style>
</head>

<body>
<div class="container py-5">

    <h2 class="dashboard-title mb-4">Dashboard</h2>

    <div class="row g-4">

        <!-- Paging Test -->
        <div class="col-md-6 col-lg-3">
            <a th:href="@{/schedule}" class="text-decoration-none text-dark">
                <div class="card shadow-sm p-3">
                    <h5>📄 ページングテスト</h5>
                    <p class="mb-0 small text-muted">/schedule</p>
                </div>
            </a>
        </div>

        <!-- Reminder Mail -->
        <div class="col-md-6 col-lg-3">
            <a th:href="@{/reminder}" class="text-decoration-none text-dark">
                <div class="card shadow-sm p-3">
                    <h5>📧 リマインドメール送信</h5>
                    <p class="mb-0 small text-muted">/reminder</p>
                </div>
            </a>
        </div>

        <!-- Reminder Mail (single) -->
        <div class="col-md-6 col-lg-3">
            <a th:href="@{/reminder2}" class="text-decoration-none text-dark">
                <div class="card shadow-sm p-3">
                    <h5>📨 リマインドメール（1件）</h5>
                    <p class="mb-0 small text-muted">/reminder2</p>
                </div>
            </a>
        </div>

        <!-- Mail Preview -->
        <div class="col-md-6 col-lg-3">
            <a th:href="@{/mail/preview}" class="text-decoration-none text-dark">
                <div class="card shadow-sm p-3">
                    <h5>🔍 メールプレビュー</h5>
                    <p class="mb-0 small text-muted">/mail/preview</p>
                </div>
            </a>
        </div>

    </div>
</div>

</body>
</html>
