<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .page-link {
            color: #6a5acd;
        }
        .page-item.active .page-link {
            background-color: #6a5acd;
            border-color: #6a5acd;
            color: #fff;
        }
    </style>
</head>

<body class="container py-4">

<h2 class="mb-4">šļąŚģöšłÄŤ¶ß</h2>

<form method="get" th:object="${form}" class="mb-3">
    <div class="input-group">
        <input type="text" th:field="*{keyword}" class="form-control" placeholder="„ā≠„Éľ„ÉĮ„Éľ„ÉČś§úÁīĘ">
        <button class="btn btn-primary" type="submit">ś§úÁīĘ</button>
    </div>
</form>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>„āŅ„ā§„Éą„Éę</th>
            <th>ťĖčŚßč</th>
            <th>ÁĶāšļÜ</th>
            <th>Ś†īśČÄ</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item : ${page.content}">
            <td th:text="${item.id}"></td>

            <td th:text="${item.start_at}"></td>
            <td th:text="${item.end_at}"></td>

    </tbody>

<nav aria-label="Page navigation">
  <ul class="pagination justify-content-center">

    <li class="page-item" th:classappend="${page.first} ? 'disabled'">

    </li>

    <li class="page-item"

        th:classappend="${i == page.number} ? 'active'">
      <a class="page-link"
         th:text="${i + 1}"
         th:href="@{/schedule(page=${i}, size=${page.size}, keyword=${form.keyword})}">
      </a>
    </li>

    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
